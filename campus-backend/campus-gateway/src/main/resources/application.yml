server:
  port: 19280

spring:
  main:
    allow-bean-definition-overriding: true
  application:
    name: campus-gateway
  data:
    redis:
      host: localhost
      port: 6379
      password: your-redis-password
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
        namespace: public
    gateway:
      httpclient:
        response-timeout: 600s     # SSE 流式长连接，10分钟超时
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        # Auth 认证服务
        - id: campus-auth
          uri: lb://campus-auth
          predicates:
            - Path=/auth/**
        # System 系统服务
        - id: campus-system
          uri: lb://campus-system
          predicates:
            - Path=/system/**
        # Python QA 问答（SSE流式 + 会话管理）
        - id: python-qa
          uri: http://localhost:8000
          predicates:
            - Path=/qa/**
          filters:
            - RewritePath=/qa/(?<segment>.*), /api/$\{segment}
        # Python 文档管理（知识库）
        - id: python-knowledge-list
          uri: http://localhost:8000
          predicates:
            - Path=/knowledge
          filters:
            - SetPath=/api/documents
        - id: python-knowledge-detail
          uri: http://localhost:8000
          predicates:
            - Path=/knowledge/**
          filters:
            - RewritePath=/knowledge/(?<segment>.*), /api/documents/$\{segment}

# Sa-Token 网关配置
sa-token:
  token-name: Authorization
  token-prefix: Bearer        # 前端 Authorization header 带 "Bearer " 前缀，必须配置才能正确解析 JWT
  timeout: 86400             # Token 有效期 24小时
  active-timeout: 1800       # 30分钟无操作过期
  is-concurrent: true        # 允许并发登录
  is-share: true             # 多端共享
  token-style: tik           # Token 风格
  is-log: false
  is-read-cookie: true       # 允许从 Cookie 读取 token（安全兜底）
  cookie-auto-fill-prefix: true  # Cookie 值自动补 Bearer 前缀
  jwt-secret-key: campusQASecretKey2024abcdefghijk

# 日志
logging:
  level:
    com.campus.gateway: debug
