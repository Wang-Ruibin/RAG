server:
  port: 9203

spring:
  application:
    name: campus-qa
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
        namespace: public
  data:
    redis:
      host: localhost
      port: 6379
      password: ${MYSQL_PASSWORD:123456}

sa-token:
  token-name: Authorization
  token-prefix: Bearer
  timeout: 86400
  active-timeout: 1800
  is-concurrent: true
  is-share: true
  token-style: tik
  is-log: false
  is-read-cookie: true
  cookie-auto-fill-prefix: true
  jwt-secret-key: campusQASecretKey2024abcdefghijk

logging:
  level:
    com.campus.qa: debug
